<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = supabase.createClient('https://iwbjzffwpijbeqyavtkd.supabase.co','sb_publishable_6tONcb7KYIxWPyIW5OTP7w_pZuXiUzu');

async function generateFeed(){
  const{data:productos}=await db.from('productos').select('*').gt('stock',0).order('created_at',{ascending:false});
  
  let xml='<?xml version="1.0" encoding="UTF-8"?>\n';
  xml+='<rss version="2.0" xmlns:g="http://base.google.com/ns/1.0">\n';
  xml+='<channel>\n';
  xml+='<title>Ruiz PSM - Repuestos y Maquinaria Industrial Ecuador</title>\n';
  xml+='<link>https://ruizpsm.com</link>\n';
  xml+='<description>Proveedor de repuestos industriales, maquinaria y equipos en Ecuador.</description>\n';

  if(productos){
    for(const p of productos){
      const imgs=p.imagenes||[];
      const imgUrl=imgs.length>0
        ?`https://iwbjzffwpijbeqyavtkd.supabase.co/storage/v1/object/public/productos/${imgs[0]}`
        :'https://ruizpsm.com/favicon.png';
      
      const specs=p.especificaciones||{};
      let desc=specs.descripcion||p.nombre;
      if(specs.marca)desc+=` Marca: ${specs.marca}.`;
      if(specs.modelo)desc+=` Modelo: ${specs.modelo}.`;
      desc+=' Disponible en Ecuador. Cotiza por WhatsApp.';

      const categoria=p.categoria||'repuestos';
      const googleCat=categoria.toLowerCase().includes('maquinaria')?'Maquinaria industrial':'Repuestos industriales';

      xml+=`<item>\n`;
      xml+=`  <g:id>${p.id}</g:id>\n`;
      xml+=`  <g:title><![CDATA[${p.nombre}]]></g:title>\n`;
      xml+=`  <g:description><![CDATA[${desc}]]></g:description>\n`;
      xml+=`  <g:link>https://ruizpsm.com</g:link>\n`;
      xml+=`  <g:image_link>${imgUrl}</g:image_link>\n`;
      xml+=`  <g:price>${parseFloat(p.precio).toFixed(2)} USD</g:price>\n`;
      xml+=`  <g:availability>in_stock</g:availability>\n`;
      xml+=`  <g:condition>new</g:condition>\n`;
      xml+=`  <g:brand><![CDATA[${specs.marca||'Ruiz PSM'}]]></g:brand>\n`;
      xml+=`  <g:google_product_category>${googleCat}</g:google_product_category>\n`;
      xml+=`  <g:product_type><![CDATA[${categoria}]]></g:product_type>\n`;
      if(p.referencia)xml+=`  <g:mpn><![CDATA[${p.referencia}]]></g:mpn>\n`;
      if(specs.modelo)xml+=`  <g:model><![CDATA[${specs.modelo}]]></g:model>\n`;
      xml+=`  <g:shipping>\n`;
      xml+=`    <g:country>EC</g:country>\n`;
      xml+=`    <g:service>Envío estándar</g:service>\n`;
      xml+=`    <g:price>0 USD</g:price>\n`;
      xml+=`  </g:shipping>\n`;
      xml+=`</item>\n`;
    }
  }

  xml+='</channel>\n</rss>';

  // Mostrar como XML puro
  document.open('text/xml');
  document.write(xml);
  document.close();
}

generateFeed();
</script>
</body>
</html>
